// ─── KPI Card Component ────────────────────────────────────
function KpiCard({ title, value, change, changeLabel, icon, color, small }) {
 const isPositive = change > 0;
 return (
 <div className={`kpi-card rounded-lg bg-liner-card p-3 ${small ? 'p-2' : 'p-3'}`}>
 <div className="flex items-center justify-between mb-1">
 <span className="text-liner-muted text-xs font-medium truncate">{title}</span>
 {icon && <span className="text-sm">{icon}</span>}
 </div>
 <div className={`font-bold text-liner-text ${small ? 'text-lg' : 'text-xl'} tracking-tight`}>{value}</div>
 {change !== undefined && (
 <div className="flex items-center gap-1 mt-1">
 <span className={`text-xs font-semibold ${isPositive ? 'text-liner-green' : 'text-liner-red'}`}>
 {isPositive ? '▲' : '▼'} {Math.abs(change)}%
 </span>
 {changeLabel && <span className="text-liner-muted text-xs">{changeLabel}</span>}
 </div>
 )}
 </div>
 );
}
function MiniBar({ data, color }) {
 const max = Math.max(...data);
 return (
 <div className="mini-chart">
 {data.map((v, i) => (
 <div key={i} className="bar" style={{ height: `${(v / max) * 100}%`, background: color || '#6C5CE7', opacity: i === data.length - 1 ? 1 : 0.5 }} />
 ))}
 </div>
 );
}
function StatusBadge({ status, text }) {
 const colors = {
 green: 'bg-liner-green/20 text-liner-green',
 red: 'bg-liner-red/20 text-liner-red',
 yellow: 'bg-liner-yellow/20 text-liner-yellow',
 blue: 'bg-liner-blue/20 text-liner-blue',
 purple: 'bg-liner-purple/20 text-liner-accent2',
 };
 return <span className={`status-badge ${colors[status] || colors.blue}`}>{text}</span>;
}
function ProgressBar({ value, max, color }) {
 return (
 <div className="w-full bg-liner-card2 rounded-full h-1.5 mt-1">
 <div className="h-1.5 rounded-full" style={{ width: `${(value/max)*100}%`, background: color || '#6C5CE7' }} />
 </div>
 );
}

// ─── Main App ──────────────────────────────────────────────
function MineAITeam() {
 const [activeAgent, setActiveAgent] = useState('chief');
 const [messages, setMessages] = useState({...CHAT_HISTORIES});
 const [input, setInput] = useState('');
 const [sending, setSending] = useState(false);
 const chatEndRef = useRef(null);
 const agent = AGENTS.find(a => a.id === activeAgent);
 const chatMsgs = messages[activeAgent] || [];
 const DashComponent = DASHBOARDS[activeAgent];
 useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatMsgs]);
 const sendMessage = async () => {
 if (!input.trim() || sending) return;
 const text = input.trim();
 setInput('');
 setMessages(prev => ({ ...prev, [activeAgent]: [...(prev[activeAgent] || []), { role: 'user', text }] }));
 setSending(true);
 try {
 const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ agentId: activeAgent, messages: [...(messages[activeAgent] || []).map(m => ({ role: m.role === 'ai' ? 'assistant' : m.role, content: m.text })), { role: 'user', content: text }] }) });
 const data = await res.json();
 setMessages(prev => ({ ...prev, [activeAgent]: [...(prev[activeAgent] || []), { role: 'ai', text: data.content || '응답을 생성할 수 없습니다.' }] }));
 } catch (e) {
 setMessages(prev => ({ ...prev, [activeAgent]: [...(prev[activeAgent] || []), { role: 'ai', text: '죄송합니다. 일시적인 오류가 발생했습니다.' }] }));
 }
 setSending(false);
 };
 return (
 <div className="flex h-screen overflow-hidden">
 {/* Sidebar */}
 <div className="w-56 bg-liner-bg border-r border-liner-border flex flex-col shrink-0">
 <div className="p-4 border-b border-liner-border">
 <div className="flex items-center gap-2">
 <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-liner-accent to-liner-accent2 flex items-center justify-center text-white text-xs font-bold">M</div>
 <div>
 <div className="text-sm font-semibold text-liner-text">MINE AI</div>
 <div className="text-[10px] text-liner-muted">MILLIMILLI Team</div>
 </div>
 </div>
 </div>
 <nav className="flex-1 overflow-y-auto p-2">
 {AGENTS.map(a => (
 <button key={a.id} onClick={() => setActiveAgent(a.id)}
 className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-left transition-all mb-0.5 ${activeAgent === a.id ? 'bg-liner-card2 text-liner-text' : 'text-liner-muted hover:bg-liner-card hover:text-liner-text'}`}>
 <span className="text-sm">{a.icon}</span>
 <span className="text-xs font-medium">{a.name}</span>
 </button>
 ))}
 </nav>
 <div className="p-3 border-t border-liner-border">
 <div className="flex items-center gap-2">
 <div className="w-6 h-6 rounded-full bg-liner-card2 flex items-center justify-center text-[10px] text-liner-muted">M</div>
 <div>
 <div className="text-xs text-liner-text">MILLIMILLI</div>
 <div className="text-[10px] text-liner-muted">대표</div>
 </div>
 </div>
 </div>
 </div>
 {/* Main */}
 <div className="flex-1 flex overflow-hidden">
 {/* Left: Chat (55%) */}
 <div className="w-[55%] flex flex-col border-r border-liner-border">
 <div className="h-12 px-4 flex items-center gap-2 border-b border-liner-border shrink-0">
 <span className="text-sm">{agent.icon}</span>
 <span className="text-sm font-semibold text-liner-text">{agent.name}</span>
 <div className="flex-1" />
 <div className="flex gap-1">
 {activeAgent === 'community' && (
 <button onClick={() => { setInput('댓글 현황 보기'); }} className="text-[10px] bg-liner-card2 text-liner-accent2 px-2 py-0.5 rounded hover:bg-liner-accent/20">댓글 현황 보기</button>
 )}
 </div>
 </div>
 <div className="flex-1 overflow-y-auto p-4 space-y-3">
 {chatMsgs.map((msg, i) => (
 <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
 <div className={`max-w-[80%] rounded-xl px-3 py-2 text-xs leading-relaxed whitespace-pre-wrap ${msg.role === 'user' ? 'bg-liner-accent text-white rounded-br-sm' : 'bg-liner-card border border-liner-border text-liner-text rounded-bl-sm'}`}>
 {msg.text}
 </div>
 </div>
 ))}
 {sending && <div className="flex justify-start"><div className="bg-liner-card border border-liner-border rounded-xl px-3 py-2 text-xs text-liner-muted">응답 생성 중...</div></div>}
 <div ref={chatEndRef} />
 </div>
 <div className="p-3 border-t border-liner-border">
 <div className="flex items-center gap-2 bg-liner-card border border-liner-border rounded-lg px-3 py-2">
 <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()}
 placeholder={`${agent.name}에게 메시지...`}
 className="flex-1 bg-transparent text-xs text-liner-text outline-none placeholder:text-liner-muted" />
 <button onClick={sendMessage} disabled={!input.trim() || sending}
 className="w-6 h-6 rounded bg-liner-accent flex items-center justify-center text-white text-xs disabled:opacity-30 hover:opacity-80">↑</button>
 </div>
 </div>
 </div>
 {/* Right: KPI Dashboard (45%) */}
 <div className="w-[45%] overflow-y-auto p-4 bg-liner-bg">
 <div className="flex items-center gap-2 mb-3">
 <span className="text-xs font-semibold text-liner-muted uppercase tracking-wider">{agent.icon} {agent.name} Dashboard</span>
 </div>
 {DashComponent && <DashComponent />}
 </div>
 </div>
 </div>
 );
}
